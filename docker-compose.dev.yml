version: '3.8'

services:
  # PostgreSQL Database for development
  postgres:
    image: postgres:15-alpine
    container_name: scanpilot_dev_postgres
    environment:
      POSTGRES_DB: scanpilot_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - scanpilot_dev_network

  # Redis for development
  redis:
    image: redis:7-alpine
    container_name: scanpilot_dev_redis
    ports:
      - "6379:6379"
    networks:
      - scanpilot_dev_network

volumes:
  postgres_dev_data:

networks:
  scanpilot_dev_network:
    driver: bridge