version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: scanpilot_postgres
    environment:
      POSTGRES_DB: scanpilot
      POSTGRES_USER: scanpilot_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanpilot_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - scanpilot_network

  # Redis for Celery task queue and caching
  redis:
    image: redis:7-alpine
    container_name: scanpilot_redis
    ports:
      - "6379:6379"
    networks:
      - scanpilot_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: scanpilot_backend
    environment:
      - DATABASE_URL=postgresql://scanpilot_user:${POSTGRES_PASSWORD:-scanpilot_pass}@postgres:5432/scanpilot
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
      - TOOLS_PATH=/app/tools
    volumes:
      - ./tools:/app/tools:ro
      - ./storage:/app/storage
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - scanpilot_network

  # Celery Worker for background tasks
  celery_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: scanpilot_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://scanpilot_user:${POSTGRES_PASSWORD:-scanpilot_pass}@postgres:5432/scanpilot
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
      - TOOLS_PATH=/app/tools
    volumes:
      - ./tools:/app/tools:ro
      - ./storage:/app/storage
      - ./backend/logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - scanpilot_network

  # Celery Beat for scheduled tasks
  celery_beat:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: scanpilot_celery_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://scanpilot_user:${POSTGRES_PASSWORD:-scanpilot_pass}@postgres:5432/scanpilot
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
    networks:
      - scanpilot_network

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: scanpilot_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - scanpilot_network

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: scanpilot_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - scanpilot_network

volumes:
  postgres_data:

networks:
  scanpilot_network:
    driver: bridge